# docker-compose override para SSL con Let's Encrypt
# Usar junto al compose principal:
#   docker compose -f deploy/docker-compose.yml -f deploy/docker-compose.ssl.yml up -d
#
# O simplemente ejecuta: bash deploy/enable-ssl.sh TU_DOMINIO

version: '3.9'

services:
  nginx:
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/nginx.ssl.conf:/etc/nginx/conf.d/default.conf:ro
      - ./frontend/dist:/usr/share/nginx/html:ro
      - ./certbot_conf:/etc/letsencrypt:ro
      - ./certbot_www:/var/www/certbot:ro

  certbot:
    image: certbot/certbot:latest
    container_name: hotspot_certbot
    volumes:
      - ./certbot_conf:/etc/letsencrypt
      - ./certbot_www:/var/www/certbot
    # Renovación automática: ejecutar periódicamente con:
    #   docker exec hotspot_certbot certbot renew --quiet
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew --quiet; sleep 12h & wait $${!}; done'"
    networks:
      - hotspot_net

networks:
  hotspot_net:
    driver: bridge
