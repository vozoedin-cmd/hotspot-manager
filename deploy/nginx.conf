server {
    listen 80;
    server_name _;

    client_max_body_size 10M;

    # Security headers
    add_header X-Frame-Options DENY always;
    add_header X-Content-Type-Options nosniff always;
    add_header Referrer-Policy no-referrer-when-downgrade always;

    # API proxy
    location /api/ {
        proxy_pass         http://hotspot_app:3000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # Socket.io proxy (WebSocket upgrade)
    location /socket.io/ {
        proxy_pass         http://hotspot_app:3000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host       $host;
        proxy_set_header   X-Real-IP  $remote_addr;
        proxy_read_timeout 86400s;
    }

    # Immutable assets (hashed filenames) — antes del location / para mayor prioridad
    location ~* \.(?:js|css|woff2?|ttf|eot|otf)$ {
        root    /usr/share/nginx/html;
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable";
        try_files $uri =404;
    }

    location ~* \.(?:png|jpg|jpeg|gif|ico|svg|webp)$ {
        root    /usr/share/nginx/html;
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable";
        try_files $uri =404;
    }

    # React SPA — named location evita el bucle de redirección
    location / {
        root  /usr/share/nginx/html;
        try_files $uri $uri/ @spa;
        expires 1h;
        add_header Cache-Control "public, max-age=3600";
    }

    location @spa {
        root /usr/share/nginx/html;
        expires 1h;
        add_header Cache-Control "public, max-age=3600";
        rewrite ^ /index.html break;
    }
}
